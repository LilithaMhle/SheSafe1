<ion-content [fullscreen]="true" class="splash-content">

  <!-- Ambient orbs -->
  <div class="orb orb-top"></div>
  <div class="orb orb-bottom"></div>

  <!-- Floating particles -->
  <div class="particle particle-1"></div>
  <div class="particle particle-2"></div>
  <div class="particle particle-3"></div>

  <!-- Centre content -->
  <div class="splash-center">

    <!-- Logo ring with embedded base64 logo -->
    <div class="logo-ring">
      <img
        src="https://res.cloudinary.com/dfvudlvl7/image/upload/v1772966451/shesafe-logo_rivtwe.png"
        alt="SheSafe Logo"
      />
    </div>

    <!-- App name -->
    <h1 class="app-name">SheSafe</h1>

    <!-- Tagline -->
    <p class="app-tagline">Empowering students through information</p>

    <!-- Animated loading bar -->
    <div class="loader-track">
      <div class="loader-fill" [style.width.%]="loadProgress"></div>
    </div>

  </div>

</ion-content>
